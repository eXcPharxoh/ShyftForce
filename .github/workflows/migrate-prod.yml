name: Migrate production database

# Runs `prisma migrate deploy` against prod whenever a push to main contains
# new migration files. Keeps the build-time Vercel deploy migration-free
# (so a bad migration can't brick all deploys), while still making schema
# rollout automatic and verifiable.
#
# Requires repo secrets:
#   PROD_DATABASE_URL — pooled Neon URL used at runtime (-pooler host)
#   PROD_DIRECT_URL   — direct Neon URL used by migrate (no pooler)

on:
  push:
    branches: [main]
    paths:
      - "prisma/migrations/**"
      - "prisma/schema.prisma"
      - ".github/workflows/migrate-prod.yml"

jobs:
  migrate:
    name: prisma migrate deploy
    runs-on: ubuntu-latest
    concurrency:
      group: migrate-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Apply pending migrations (with cold-start retry)
        # Neon Free tier auto-suspends the compute after ~5 min idle. When
        # GH Actions runs migrate, the first connection has to wake the
        # compute and Prisma's default TCP timeout (~5s) sometimes fires
        # first, returning P1001 "Can't reach database server". Retrying
        # the whole `migrate deploy` a few times with backoff handles the
        # wake-up cleanly. After the first successful connection the
        # compute stays warm for subsequent ops.
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_URL:   ${{ secrets.PROD_DIRECT_URL }}
        run: |
          set +e
          for i in 1 2 3 4 5; do
            echo "::group::Attempt $i — prisma migrate status"
            npx prisma migrate status
            status_exit=$?
            echo "::endgroup::"
            echo "::group::Attempt $i — prisma migrate deploy"
            npx prisma migrate deploy
            deploy_exit=$?
            echo "::endgroup::"
            if [ $deploy_exit -eq 0 ]; then
              echo "✅ Migration succeeded on attempt $i"
              exit 0
            fi
            echo "⚠️  Attempt $i failed (status=$status_exit deploy=$deploy_exit). Sleeping 10s..."
            sleep 10
          done
          echo "❌ All 5 attempts exhausted. Check Neon compute state + URL format."
          exit 1
